workflows:
  ios-adhoc:
    name: Salat Tracker — iOS IPA (Ad Hoc)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.salattracker.app
        APP_NAME: SalatTracker
      groups:
        - ios_signing   # contains CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD, CM_PROVISIONING_PROFILE

    scripts:
      - name: Install Node dependencies
        script: |
          npm install

      - name: Expo Prebuild — generate native iOS project
        script: |
          npx expo prebuild --platform ios --clean --non-interactive

      - name: CocoaPods install
        script: |
          cd ios && pod install

      - name: Set up keychain & import certificate
        script: |
          keychain initialize

          # Decode and import your .p12 certificate
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 \
            --certificate-password $CM_CERTIFICATE_PASSWORD

          # Decode and install your provisioning profile
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(grep -a -A1 '<key>UUID</key>' /tmp/profile.mobileprovision \
            | grep '<string>' | sed 's/.*<string>\(.*\)<\/string>.*/\1/' | xargs)
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/$APP_NAME.xcworkspace" \
            --scheme "$APP_NAME" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - md.mizan235@gmail.com    # ← PUT YOUR EMAIL HERE
        notify:
          success: true
          failure: true
