workflows:
  ios-unsigned:
    name: Salat Tracker — Unsigned IPA
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default
      vars:
        APP_NAME: SalatTracker
        BUNDLE_ID: com.salattracker.app

    scripts:
      - name: Install Node dependencies
        script: |
          npm install

      - name: Expo Prebuild — generate native iOS project
        script: |
          npx expo prebuild --platform ios --clean --non-interactive

      - name: CocoaPods install
        script: |
          cd ios && pod install

      - name: Build and package unsigned IPA
        script: |
          # Step 1: Archive the app
          xcodebuild archive \
            -workspace ios/$APP_NAME.xcworkspace \
            -scheme $APP_NAME \
            -configuration Release \
            -sdk iphoneos \
            -archivePath /tmp/$APP_NAME.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # Step 2: Find .app inside the archive
          APP_PATH=$(find /tmp/$APP_NAME.xcarchive \
            -name "*.app" -maxdepth 4 | head -1)
          echo "✅ App found at: $APP_PATH"
          ls -la "$APP_PATH"

          # Step 3: Package into IPA
          rm -rf /tmp/Payload
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/
          cd /tmp
          zip -r $APP_NAME.ipa Payload
          echo "✅ IPA size: $(du -sh $APP_NAME.ipa)"

          # Step 4: Move to artifacts
          mkdir -p $CM_BUILD_DIR/build/ios/ipa
          mv /tmp/$APP_NAME.ipa $CM_BUILD_DIR/build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - md.mizan235@gmail.com
        notify:
          success: true
          failure: true
