workflows:
  ios-unsigned:
    name: Salat Tracker — Unsigned IPA
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default
      vars:
        APP_NAME: SalatTracker
        BUNDLE_ID: com.salattracker.app

    scripts:
      - name: Install Node dependencies
        script: |
          npm install

      - name: Expo Prebuild — generate native iOS project
        script: |
          npx expo prebuild --platform ios --clean --non-interactive

      - name: CocoaPods install
        script: |
          cd ios && pod install

      - name: Build unsigned IPA
        script: |
          xcodebuild \
            -workspace ios/$APP_NAME.xcworkspace \
            -scheme $APP_NAME \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ios/build

          # Package into IPA manually
          mkdir -p build/ios/ipa/Payload
          cp -r ios/build/Build/Products/Release-iphoneos/$APP_NAME.app \
            build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../../../$APP_NAME.ipa Payload
          cd ../../..
          mkdir -p build/ios/ipa
          mv $APP_NAME.ipa build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - md.mizan235@gmail.com    # ← PUT YOUR EMAIL HERE
        notify:
          success: true
          failure: true
