workflows:
  ios-adhoc:
    name: Salat Tracker — iOS IPA (Ad Hoc)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.salattracker.app
        APP_NAME: SalatTracker
      groups:
        - ios_signing

    scripts:
      - name: Install Node dependencies
        script: |
          npm install

      - name: Expo Prebuild — generate native iOS project
        script: |
          npx expo prebuild --platform ios --clean --non-interactive

      - name: CocoaPods install
        script: |
          cd ios && pod install

      - name: Set up keychain & import certificate
        script: |
          keychain initialize

          # Decode certificate
          echo $CM_CERTIFICATE | base64 -D -o /tmp/cert.p12

          # Import certificate (handle empty password)
          if [ -z "$CM_CERTIFICATE_PASSWORD" ]; then
            keychain add-certificates --certificate /tmp/cert.p12
          else
            keychain add-certificates \
              --certificate /tmp/cert.p12 \
              --certificate-password "$CM_CERTIFICATE_PASSWORD"
          fi

          # Decode and install provisioning profile
          echo $CM_PROVISIONING_PROFILE | base64 -D -o /tmp/profile.mobileprovision
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp /tmp/profile.mobileprovision \
            "$HOME/Library/MobileDevice/Provisioning Profiles/salattracker.mobileprovision"

          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/$APP_NAME.xcworkspace" \
            --scheme "$APP_NAME" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - md.mizan235@gmail.com
        notify:
          success: true
          failure: true
