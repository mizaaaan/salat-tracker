workflows:
  ios-release:
    name: Salat Tracker iOS
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install Node dependencies
        script: npm install

      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform ios --clean

      - name: Remove Push Notifications entitlement
        script: |
          ENTITLEMENTS="ios/SalatTracker/SalatTracker.entitlements"
          if [ -f "$ENTITLEMENTS" ]; then
            /usr/libexec/PlistBuddy -c "Delete :aps-environment" \
              "$ENTITLEMENTS" 2>/dev/null || true
          fi
      
      - name: CocoaPods install
        script: cd ios && pod install

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/SalatTracker.xcworkspace" \
            --scheme "SalatTracker"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - md.mizan235@gmail.com
        notify:
          success: true
          failure: true
